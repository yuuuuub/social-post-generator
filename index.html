<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📱 朋友圈文案生成器</title>
<style>
  :root {
    --bg: #f5f5f5;
    --card-bg: #ffffff;
    --text: #1a1a1a;
    --text-secondary: #666;
    --border: #e0e0e0;
    --accent: #6366f1;
    --accent-hover: #4f46e5;
    --tag-bg: #eef2ff;
    --tag-text: #4338ca;
    --preview-bg: #fafafa;
    --input-bg: #fff;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --crazy-bg: linear-gradient(135deg, #fef2f2, #fdf2f8, #f0f9ff);
  }
  [data-theme="dark"] {
    --bg: #1a1a2e;
    --card-bg: #16213e;
    --text: #e8e8e8;
    --text-secondary: #a0a0b8;
    --border: #2a2a4a;
    --accent: #818cf8;
    --accent-hover: #6366f1;
    --tag-bg: #1e1b4b;
    --tag-text: #a5b4fc;
    --preview-bg: #0f3460;
    --input-bg: #1a1a2e;
    --shadow: 0 2px 12px rgba(0,0,0,0.3);
    --crazy-bg: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }
  .container { max-width: 540px; margin: 0 auto; padding: 16px; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0;
  }
  header h1 { font-size: 22px; font-weight: 700; }
  .theme-toggle {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 50%; width: 40px; height: 40px; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .theme-toggle:hover { border-color: var(--accent); }
  .card {
    background: var(--card-bg); border-radius: 16px;
    padding: 20px; margin-bottom: 16px;
    box-shadow: var(--shadow); border: 1px solid var(--border);
  }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .scene-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .scene-tag {
    padding: 10px 6px; border-radius: 10px; border: 1.5px solid var(--border);
    background: var(--card-bg); cursor: pointer; text-align: center;
    font-size: 13px; transition: all 0.2s; user-select: none;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .scene-tag:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(99,102,241,0.15); }
  .scene-tag.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  .scene-tag .icon { font-size: 20px; }
  .input-group { margin-bottom: 12px; }
  .input-group:last-child { margin-bottom: 0; }
  .input-group label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; font-weight: 500; }
  .input-group input {
    width: 100%; padding: 10px 14px; border-radius: 10px; border: 1.5px solid var(--border);
    background: var(--input-bg); color: var(--text); font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  .input-group input:focus { border-color: var(--accent); }
  .input-group input::placeholder { color: #999; }
  .mode-switch {
    display: flex; background: var(--bg); border-radius: 12px; padding: 4px; gap: 4px;
  }
  .mode-btn {
    flex: 1; padding: 10px; border: none; border-radius: 10px;
    cursor: pointer; font-size: 14px; font-weight: 500; background: transparent;
    color: var(--text-secondary); transition: all 0.2s;
  }
  .mode-btn.active { background: var(--card-bg); color: var(--text); box-shadow: 0 2px 6px rgba(0,0,0,0.08); font-weight: 600; }
  .btn-row { display: flex; gap: 10px; margin-top: 16px; }
  .btn {
    flex: 1; padding: 12px; border-radius: 12px; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
  .btn-outline { background: transparent; border: 1.5px solid var(--accent); color: var(--accent); }
  .btn-outline:hover { background: var(--accent); color: #fff; }
  .btn:active { transform: scale(0.97); }
  .preview-area {
    min-height: 100px; padding: 16px; border-radius: 12px;
    background: var(--preview-bg); border: 1px solid var(--border);
    font-size: 15px; line-height: 1.8; white-space: pre-wrap;
    word-break: break-word; position: relative;
  }
  .preview-area.is-crazy {
    background: var(--crazy-bg);
    border-color: var(--accent);
    border-width: 2px;
  }
  .preview-area.is-crazy::before {
    content: '🤪 发疯模式';
    position: absolute; top: -12px; right: 12px;
    background: var(--accent); color: #fff; font-size: 11px;
    padding: 2px 10px; border-radius: 10px; font-weight: 600;
  }
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: #1a1a1a; color: #fff; padding: 10px 24px;
    border-radius: 12px; font-size: 14px; z-index: 100;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  footer { text-align: center; padding: 24px 0; color: var(--text-secondary); font-size: 12px; }
  @media (max-width: 400px) {
    .scene-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .scene-tag { padding: 8px 4px; font-size: 12px; }
    .scene-tag .icon { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📱 朋友圈文案生成器</h1>
    <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
  </header>

  <div class="card">
    <div class="card-title">🎭 选择场景</div>
    <div class="scene-grid" id="sceneGrid">
      <button class="scene-tag active" data-scene="food"><span class="icon">🍱</span>晒美食</button>
      <button class="scene-tag" data-scene="travel"><span class="icon">✈️</span>晒旅行</button>
      <button class="scene-tag" data-scene="overtime"><span class="icon">💼</span>晒加班</button>
      <button class="scene-tag" data-scene="selfie"><span class="icon">🤳</span>晒自拍</button>
      <button class="scene-tag" data-scene="weekend"><span class="icon">🌿</span>晒周末</button>
      <button class="scene-tag" data-scene="emo"><span class="icon">🥀</span>emo</button>
      <button class="scene-tag" data-scene="positive"><span class="icon">✨</span>正能量</button>
      <button class="scene-tag" data-scene="showoff"><span class="icon">👑</span>凡尔赛</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">✏️ 自定义参数（可选）</div>
    <div class="input-group">
      <label>📍 地点</label>
      <input type="text" id="location" placeholder="如：三里屯 / 大理 / 办公室">
    </div>
    <div class="input-group">
      <label>🍽️ 食物名 / 事物名</label>
      <input type="text" id="foodItem" placeholder="如：火锅 / 日出 / 咖啡">
    </div>
    <div class="input-group">
      <label>💬 心情关键词</label>
      <input type="text" id="mood" placeholder="如：开心 / 疲惫 / 治愈">
    </div>
  </div>

  <div class="card">
    <div class="card-title">🎨 文案模式</div>
    <div class="mode-switch">
      <button class="mode-btn active" data-mode="normal">😊 正经模式</button>
      <button class="mode-btn" data-mode="crazy">🤪 发疯模式</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="generateBtn">🎲 生成文案</button>
      <button class="btn btn-outline" id="copyBtn">📋 一键复制</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">👁️ 预览效果</div>
    <div class="preview-area" id="previewArea">👆 选择场景后点击「生成文案」开始</div>
  </div>

  <footer>💡 随机抽取文案模板，每次生成都不一样哦</footer>
</div>

<div class="toast" id="toast"></div>

  function crazyTransform(text) {
    let t = text;
    // Make it more exaggerated
    t = t.replace(/！/g, '!!!!');
    t = t.replace(/～/g, '~~~~');
    t = t.replace(/！+/g, '!!!!');
    // Capitalize emotional words
    t = t.replace(/绝了/g, '绝了🔥🔥🔥');
    t = t.replace(/到飞起/g, '到飞起🚀🚀🚀');
    t = t.replace(/满分/g, '满分💯💯💯');

    t = t.replace(/治愈/g, '治愈🥹🥹🥹');

    const lines = t.split('\n');
    return lines.map(line => {
      if (line.trim() && line.trim() !== '---' && !line.startsWith('!')) {
        const emoji = crazyEmojis[Math.floor(Math.random() * crazyEmojis.length)];

          line = emoji + ' ' + line;
        } else {
          line = line + ' ' + emoji;
        }
      }
      return line;
    }).join('\n');
  }

    const toast = $('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function getRandomTemplate(scene) {
    const templates = templateDB[scene];
    return templates[Math.floor(Math.random() * templates.length)];
  }

  function fillTemplate(template, params) {
    return template
      .replace(/\{location\}/g, params.location)
      .replace(/\{食物\}/g, params.food)
      .replace(/\{food\}/g, params.food)
      .replace(/\{mood\}/g, params.mood)
      .replace(/\{something\}/g, params.food);
  }

  function generatePost() {
    const location = $('location').value.trim() || defaults[currentScene].location;
    const food = $('foodItem').value.trim() || defaults[currentScene].food;
    const mood = $('mood').value.trim() || defaults[currentScene].mood;

    const template = getRandomTemplate(currentScene);
    let text = fillTemplate(template, { location, food, mood });

    if (currentMode === 'crazy') {
      const prefix = crazyPrefixes[Math.floor(Math.random() * crazyPrefixes.length)];
      const suffix = crazySuffixes[Math.floor(Math.random() * crazySuffixes.length)];
      text = prefix + crazyTransform(text) + suffix;
    }

    currentText = text;

    const preview = $('previewArea');
    preview.textContent = text;
    preview.className = 'preview-area' + (currentMode === 'crazy' ? ' is-crazy' : '');
  }

  function copyText() {
    if (!currentText) {
      showToast('⚠️ 请先生成文案');
      return;
    }
    navigator.clipboard.writeText(currentText).then(() => {
      showToast('✅ 已复制到剪贴板');
    }).catch(() => {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = currentText;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('✅ 已复制到剪贴板');
    });
  }

  $('generateBtn').addEventListener('click', generatePost);
  $('copyBtn').addEventListener('click', copyText);
